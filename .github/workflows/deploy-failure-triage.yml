name: Deploy Failure Triage

on:
  workflow_run:
    workflows:
      - Worker Deploy
      - Daily Gallery Export
      - Admin Web Deploy
    types:
      - completed

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  triage:
    if: |
      github.event.workflow_run.conclusion == 'failure' ||
      github.event.workflow_run.conclusion == 'timed_out' ||
      github.event.workflow_run.conclusion == 'cancelled' ||
      github.event.workflow_run.conclusion == 'action_required'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Comment triage summary on associated PR
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const run = context.payload.workflow_run;

            const associated = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: run.head_sha,
            });
            const mergedPrs = (associated.data || []).filter((pr) => !!pr.merged_at);
            if (mergedPrs.length === 0) {
              core.info("No merged PR found for failed deploy run; skipping PR comment.");
              return;
            }

            const targetPr = mergedPrs.sort(
              (a, b) => new Date(b.merged_at) - new Date(a.merged_at)
            )[0];

            const jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
              owner,
              repo,
              run_id: run.id,
              per_page: 100,
            });
            const failedJobs = jobs.filter(
              (job) =>
                job.conclusion &&
                !["success", "skipped", "neutral"].includes(job.conclusion)
            );

            const jobLines = failedJobs.map((job) => {
              const failedSteps = (job.steps || [])
                .filter(
                  (step) =>
                    step.conclusion &&
                    !["success", "skipped", "neutral"].includes(step.conclusion)
                )
                .map((step) => step.name);
              const stepInfo =
                failedSteps.length > 0
                  ? ` (failed steps: ${failedSteps.join(", ")})`
                  : "";
              return `- ${job.name}: ${job.conclusion}${stepInfo}`;
            });

            const body = [
              "## Deploy Failure Triage",
              "",
              `Workflow: **${run.name}**`,
              `Run: ${run.html_url}`,
              `Conclusion: **${run.conclusion}**`,
              `Head SHA: \`${run.head_sha}\``,
              "",
              "Failed jobs:",
              ...(jobLines.length > 0 ? jobLines : ["- (No job details returned by API)"]),
              "",
              "Quick follow-up:",
              "1. `gh run view <run-id> --log-failed` で失敗ログを確認",
              "2. 原因修正後に再実行 or 追補PRを作成",
            ].join("\n");

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: targetPr.number,
              per_page: 100,
            });
            const marker = `Run: ${run.html_url}`;
            if (comments.some((comment) => comment.body?.includes(marker))) {
              core.info("Triage comment already exists for this run.");
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: targetPr.number,
              body,
            });

            core.info(`Posted triage comment to PR #${targetPr.number}`);
